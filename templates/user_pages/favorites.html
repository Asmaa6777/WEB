<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Favourites - RecipeFinder</title>
  <link rel="stylesheet" href="../../assets/css/navbar.css" />
  <link rel="stylesheet" href="../../assets/css/style.css" />
  <script src="../../assets/js/navbar.js" defer></script>
</head>
<body>
  <main-navbar></main-navbar>

  <div class="page-header">
    <p class="section-label">YOUR COLLECTION</p>
    <h1 class="page-title">My <em class="gold-italic">Favourites</em></h1>
    <p class="page-sub">Recipes you've saved to cook again and again.</p>

    <div class="filter-pills">
      <button class="pill active" data-filter="all">All</button>
      <button class="pill" data-filter="appetizer">Appetizers</button>
      <button class="pill" data-filter="main-course">Main Course</button>
      <button class="pill" data-filter="dessert">Dessert</button>
    </div>
  </div>

  <div class="recipes-section">
    <div class="recipe-grid" id="recipeGrid"></div>
    <div class="empty-state" id="emptyState">
      <p>No favourite recipes yet. <a href="recipes.html">Browse recipes</a> and add some!</p>
    </div>
  </div>

  <script src="../../assets/js/data.js"></script>
  <script src="../../assets/js/favorites.js"></script>
</body>
</html>
