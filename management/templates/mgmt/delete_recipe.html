{% extends "base.html" %}
{% load static %}

{% block title %}Delete Recipe - {{ recipe.name }}{% endblock %}

{% block content %}
<div style="padding: 50px; text-align: center;">
    <h1 style="color: #d9534f;">Delete Recipe</h1>
    <p>Are you sure you want to delete "<strong>{{ recipe.name }}</strong>"?</p>
    <p>This action cannot be undone.</p>

    <form method="post" style="margin-top: 30px;">
        {% csrf_token %}
        <button type="submit" class="btn-view" style="background-color: #d9534f; border-color: #d43f3a; padding: 10px 20px; cursor: pointer;">Yes, Delete</button>
        <a href="{% url 'recipe_manage' %}" style="margin-left: 20px; text-decoration: none; color: #555;">Cancel</a>
    </form>
</div>
{% endblock %}
