<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RecipeFinder — All Recipes</title>
  <link rel="stylesheet" href="/WEB/assets/css/style.css" />
</head>
<body>


  <nav class="navbar">
    <div class="nav-logo">
      <span class="logo-circle">R</span>
      Recipe<span class="logo-gold">Finder</span>
    </div>
    <ul class="nav-links">
      <li><a href="../homepage.html">Home</a></li>
      <li><a href="recipes.html" class="active">Recipes</a></li>
      <li><a href="favorites.html">Favourites</a></li>
      <li><a href="../trending.html">Trending</a></li>
    </ul>
    <div class="nav-user">
      <span id="navUsername"></span>
      <a href="../login.html" class="nav-logout">Logout</a>
    </div>
  </nav>

 
  <div class="page-header">
    <p class="section-label"> OUR COLLECTION </p>
    <h1 class="page-title">All <em class="gold-italic">Recipes</em></h1>

    <div class="search-wrapper">
      <input type="text" id="searchInput" class="search-bar" placeholder="Search recipes or ingredients..." />
    </div>

    <div class="filter-pills">
      <button class="pill active" data-filter="all">All</button>
      <button class="pill" data-filter="appetizer">Appetizers</button>
      <button class="pill" data-filter="main-course">Main Course</button>
      <button class="pill" data-filter="dessert">Dessert</button>
    </div>
  </div>

 
  <div class="recipes-section">
    <div class="recipe-grid" id="recipeGrid"></div>
    <div class="empty-state" id="emptyState">
      <p>No recipes found. Try a different search or filter.</p>
    </div>
  </div>


  <script src="/WEB/assets/js/data.js"></script>
  <script src="/WEB/assets/js/recipes.js"></script>

</body>
</html>
