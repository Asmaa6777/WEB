<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Favourites – RecipeFinder</title>
  <link rel="stylesheet" href="../../assets/css/style.css" />
</head>
<body>

  <nav class="navbar">
    <div class="nav-logo">
      <span class="logo-circle">R</span>
      Recipe<span class="logo-gold">Finder</span>
    </div>
    <ul class="nav-links">
      <li><a href="../homepage.html">Home</a></li>
      <li><a href="recipes.html">Recipes</a></li>
      <li><a href="favorites.html" class="active">Favourites</a></li>
      <li><a href="../trending.html">Trending</a></li>  
    </ul>
    <div class="nav-user">
      <span id="navUsername"></span>
      <a href="../login.html" class="nav-logout">Logout</a>
    </div>
  </nav>

  <div class="page-header">
    <p class="section-label">YOUR COLLECTION</p>
    <h1 class="page-title">My <em class="gold-italic">Favourites</em></h1>
    <p class="page-sub">Recipes you've saved to cook again and again.</p>

    <div class="filter-pills">
      <button class="pill active" data-filter="all">All</button>
      <button class="pill" data-filter="appetizer">Appetizers</button>
      <button class="pill" data-filter="main-course">Main Course</button>
      <button class="pill" data-filter="dessert">Dessert</button>
    </div>
  </div>

  <div class="recipes-section">
    <div class="recipe-grid" id="recipeGrid"></div>
    <div class="empty-state" id="emptyState">
      <p>No favourite recipes yet. <a href="recipes.html">Browse recipes</a> and add some!</p>
    </div>
  </div>

  <script src="../../assets/js/data.js"></script>
  <script src="../../assets/js/favorites.js"></script>

</body>
</html>
