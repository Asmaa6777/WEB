<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Recipe Finder - Sign Up</title>
</head>

<body>
    
  <main>
    <h1>Recipe Finder</h1>
    <h2>Create an Account</h2>
    <p>Fill in the details below to sign up. Fields marked with * are required.</p>
 
    <hr>
 
    <form action="recipes.html" method="GET">
 
      <fieldset>
        <legend>Personal Information</legend>
 
        <label for="firstName">First Name: *</label><br>
        <input type="text" id="firstName" name="firstName" placeholder="e.g. Sarah" required /><br><br>
 
        <label for="lastName">Last Name: *</label><br>
        <input type="text" id="lastName" name="lastName" placeholder="e.g. Smith" required /><br><br>
 
        <label for="dob">Date of Birth: *</label><br>
        <input type="date" id="dob" name="dob" required /><br><br>
 
      </fieldset>
 
      <br>
 
      <fieldset>
        <legend>Account Details</legend>
 
        <label for="username">Username: *</label><br>
        <input type="text" id="username" name="username" placeholder="e.g. sarahcooks" required /><br><br>
 
        <label for="email">Email Address: *</label><br>
        <input type="email" id="email" name="email" placeholder="e.g. sarah@gmail.com" required /><br><br>
 
        <label for="password">Password: *</label><br>
        <input type="password" id="password" name="password" placeholder="At least 8 characters" minlength="8" required /><br><br>
 
        <label for="confirmPassword">Confirm Password: *</label><br>
        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Repeat your password" required />
 
      </fieldset>
 
      <br>
 
      <fieldset>
        <legend>Account Type</legend>
 
        <p>Select your role:</p>
 
        <input type="radio" id="regularUser" name="role" value="user" checked />
        <label for="regularUser">Regular User — Browse and save favourite recipes</label><br><br>
 
        <input type="radio" id="adminUser" name="role" value="admin" />
        <label for="adminUser">Admin — Add, edit, and delete recipes</label>
 
      </fieldset>
 
      <br>
 
 
      <button type="submit">Create Account</button>
      &nbsp;
      <a href="login.html"><button type="button">Already have an account? Log in</button></a>
      <input type="submit" value="Sign Up" />
 
    </form>
 
  </main>
 
  <hr>
    <footer>
        <p>&copy; Welcome to the Recipe Finder</p>
    </footer>
</body>
</html>
