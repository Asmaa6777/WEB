<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Recipes - Recipe Finder</title>
  <link rel="stylesheet" href="../../assets/css/style.css" />
  <link rel="stylesheet" href="../../assets/css/admin_profile.css" />
  <script src="../../assets/js/admin_navbar.js" defer></script>
</head>
<body>
  <admin-navbar></admin-navbar>

  <div class="page-header">
    <p class="section-label">ADMIN COLLECTION</p>
    <h1 class="page-title">All <em class="gold-italic">Recipes</em></h1>

    <div class="search-wrapper">
      <input type="text" id="searchInput" class="search-bar" placeholder="Search recipes or ingredients..." />
    </div>

    <div class="filter-pills">
      <button class="pill active" data-filter="all">All</button>
      <button class="pill" data-filter="appetizer">Appetizers</button>
      <button class="pill" data-filter="main-course">Main Course</button>
      <button class="pill" data-filter="dessert">Dessert</button>
    </div>

    <div style="margin-top: 24px;">
      <a href="add_recipe.html" class="btn-view">Add Recipe</a>
    </div>
  </div>

  <div class="recipes-section">
    <div class="recipe-grid" id="recipeGrid"></div>
    <div class="empty-state" id="emptyState">
      <p>No recipes found. Try a different search or filter.</p>
    </div>
  </div>

  <script src="../../assets/js/data.js"></script>
  <script src="../../assets/js/admin-recipes.js"></script>
</body>
</html>
