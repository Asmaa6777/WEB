<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../../assets/css/admin_dashboard.css">
    <link rel="stylesheet" href="../../assets/css/admin_profile.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="../../assets/js/admin_navbar.js" defer></script>
    <title>Admin Dashboard - Recipe Finder</title>
</head>

<body>

    <main>
        
        <header>
            <h1>Admin Dashboard</h1>
  <admin-navbar></admin-navbar>
    <hr> 
        </header>

        <hr>
        <section>
            <table width="100%" border="1" cellpadding="10" cellspacing="0">
                <tr>
                    <td id="stat-total">
                        <h3>Total Recipes</h3>
                        <p><strong>[Dynamic: 180]</strong></p>
                    </td>
                    <td id="stat-appetizers">
                        <h3>Appetizers</h3>
                        <p><strong>[Dynamic: 45]</strong></p>
                    </td>
                    <td id="stat-mains">
                        <h3>Main Courses</h3>
                        <p><strong>[Dynamic: 85]</strong></p>
                    </td>
                    <td id="stat-desserts">
                        <h3>Desserts</h3>
                        <p><strong>[Dynamic: 50]</strong></p>
                    </td>
                    <td id="stat-users">
                        <h3>Total Users</h3>
                        <p><strong>[Dynamic: 320]</strong></p>
                    </td>
                </tr>
            </table>
        </section>

        <br>

        <section>
            <table width="100%">
                <tr>
                    <td align="left">
                        <form id="searchForm" action="search_results.html" method="GET">
                            <input type="text" name="search" placeholder="Search recipes..." required>
                            <button type="submit"> Search</button>
                        </form>
                    </td>
                    <td align="right">
                        <a href="add_recipe.html">
                            <button type="button">+ Add Recipe</button>
                        </a>
                    </td>
                </tr>
            </table>

            <br>

            <table border="1" width="100%" cellpadding="10" cellspacing="0">
                <thead>
                    <tr>
                        <th></th>
                        <th>RECIPE ID</th>
                        <th>RECIPE NAME</th>
                        <th>COURSE NAME</th>
                        <th>DATE ADDED</th>
                        <th>STATUS</th>
                        <th>ACTIONS</th>
                    </tr>
                </thead>
                <tbody id="recipesTableBody">
                </tbody>
            </table>
        </section>

    </main>

    <script src="../../assets/data_files/data.js"></script>
    <script src="../../assets/js/admin_dashboard.js" defer></script>
</body>
</html>
